<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Aperture Science — GLaDOS Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="orb-container"></div>

    <div id="ui-overlay">
      <div id="status-bar">
        <span id="status-icon"></span>
        <span id="status-text">Initializing...</span>
      </div>

      <div id="transcript">
        <div id="transcript-messages"></div>
      </div>

      <div id="controls">
        <button id="btn-mic" title="Push to talk" disabled>
          <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
        <div id="text-input-wrapper">
          <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off">
          <button id="btn-send" title="Send">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="audio.js"></script>
  <script src="orb.js"></script>
  <script src="app.js"></script>
</body>
</html>
